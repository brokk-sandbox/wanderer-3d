<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANDERER 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; color: #eee; background: #000; }
        #toolbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; border: 2px solid #444;
            display: flex; gap: 10px; z-index: 100;
        }
        .toolbar-label { position: absolute; top: -15px; width: 100%; text-align: center; font-size: 9px; color: #aaa; font-weight: bold; }
        .toolbar-key { position: absolute; bottom: -14px; width: 100%; text-align: center; font-size: 9px; color: #666; font-weight: bold; }
        .toolbar-sep { width: 2px; background: #333; margin: 5px 2px; border-radius: 1px; }

        #bag-window, #box-window, #craft-window, #equip-window, #pockets-window {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(45, 45, 45, 0.98); padding: 15px; border-radius: 12px;
            border: 3px solid #8b4513; display: none; z-index: 500; box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        #equip-window { border-color: #4a4a4a; background: rgba(35, 35, 35, 0.95); }
        .paperdoll-area { position: relative; width: 340px; height: 440px; background: rgba(0,0,0,0.3); border-radius: 16px; border: 1px solid #333; }
        /* Human silhouette parts */
        .pd-head { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 50px; height: 55px; background: rgba(120,120,120,0.25); border-radius: 50%; border: 2px solid rgba(150,150,150,0.3); }
        .pd-neck { position: absolute; top: 72px; left: 50%; transform: translateX(-50%); width: 20px; height: 18px; background: rgba(120,120,120,0.2); }
        .pd-torso { position: absolute; top: 88px; left: 50%; transform: translateX(-50%); width: 90px; height: 110px; background: rgba(120,120,120,0.2); border-radius: 8px 8px 4px 4px; border: 2px solid rgba(150,150,150,0.2); }
        .pd-arm-l { position: absolute; top: 95px; left: 42px; width: 30px; height: 105px; background: rgba(120,120,120,0.15); border-radius: 15px; transform: rotate(12deg); }
        .pd-arm-r { position: absolute; top: 95px; right: 42px; width: 30px; height: 105px; background: rgba(120,120,120,0.15); border-radius: 15px; transform: rotate(-12deg); }
        .pd-hand-l { position: absolute; top: 192px; left: 32px; width: 22px; height: 22px; background: rgba(120,120,120,0.2); border-radius: 50%; }
        .pd-hand-r { position: absolute; top: 192px; right: 32px; width: 22px; height: 22px; background: rgba(120,120,120,0.2); border-radius: 50%; }
        .pd-waist { position: absolute; top: 198px; left: 50%; transform: translateX(-50%); width: 80px; height: 15px; background: rgba(120,120,120,0.15); }
        .pd-leg-l { position: absolute; top: 213px; left: 112px; width: 38px; height: 140px; background: rgba(120,120,120,0.15); border-radius: 6px; }
        .pd-leg-r { position: absolute; top: 213px; right: 112px; width: 38px; height: 140px; background: rgba(120,120,120,0.15); border-radius: 6px; }
        .pd-foot-l { position: absolute; top: 350px; left: 105px; width: 50px; height: 22px; background: rgba(120,120,120,0.2); border-radius: 6px 12px 8px 4px; }
        .pd-foot-r { position: absolute; top: 350px; right: 105px; width: 50px; height: 22px; background: rgba(120,120,120,0.2); border-radius: 12px 6px 4px 8px; }
        /* Equipment slots positioned over the doll */
        .paperdoll-area .equip-slot { position: absolute; z-index: 2; }

        #craft-window { border-color: #ffd700; }
        .win-header {
            background: rgba(0,0,0,0.3); margin: -15px -15px 15px -15px; padding: 10px;
            border-bottom: 1px solid #444; cursor: move; color: #cd853f; font-weight: bold;
            border-radius: 10px 10px 0 0; user-select: none;
            display: flex; justify-content: space-between; align-items: center;
        }
        .win-close { cursor: pointer; color: #666; font-family: monospace; font-size: 18px; padding: 0 5px; }
        .win-close:hover { color: #ff4444; }
        .equip-slot {
            width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 2px dashed #555;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-sizing: border-box;
        }
        .equip-slot:hover { border-color: #ffd700; background: rgba(255,215,0,0.1); box-shadow: 0 0 8px rgba(255,215,0,0.3); }
        .equip-slot::after { content: attr(data-label); position: absolute; bottom: -16px; font-size: 9px; color: #999; width: 100%; text-align: center; font-weight: bold; letter-spacing: 1px; }
        #slot-head::after { bottom: auto; top: -16px; }
        #slot-feet::after { bottom: -18px; }

        #bag-grid { display: grid; grid-template-columns: repeat(3, 65px); grid-gap: 12px; }
        #box-grid { display: grid; grid-template-columns: repeat(6, 65px); grid-gap: 12px; }
        .slot {
            width: 65px; height: 65px; background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333; border-radius: 8px; display: flex; align-items: center;
            justify-content: center; position: relative; cursor: pointer; transition: all 0.2s;
        }
        .slot.disabled { background: rgba(0,0,0,0.5); cursor: not-allowed; border-color: #222; }
        .slot.disabled div { opacity: 0.1; }
        .slot:hover { background: rgba(255, 255, 255, 0.15); border-color: #777; }
        .slot.selected { border: 3px solid #ffd700; background: rgba(255, 215, 0, 0.1); box-shadow: 0 0 10px #ffd700; }

        .item-count {
            position: absolute; bottom: 2px; right: 5px; font-size: 14px; font-weight: bold;
            color: white; text-shadow: 1px 1px 2px black; pointer-events: none;
        }
        .item-label {
            position: absolute; bottom: -1px; left: 0; width: 100%; text-align: center;
            font-size: 8px; font-weight: bold; color: #ccc; text-shadow: 1px 1px 2px black;
            pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding: 0 2px; box-sizing: border-box; line-height: 12px;
            background: rgba(0,0,0,0.5); border-radius: 0 0 6px 6px;
        }
        .slot .item-label { font-size: 8px; }
        .equip-slot .item-label { font-size: 7px; bottom: 2px; }
        .icon-Wood { width: 45px; height: 14px; background: #4d2911; border-radius: 3px; border: 1px solid #222; }
        .icon-Rock { width: 35px; height: 35px; background: #888; border-radius: 40%; border: 1px solid #444; }
        .icon-Leather { width: 30px; height: 40px; background: #c19a6b; border-radius: 5px; border: 1px solid #8b4513; transform: rotate(-10deg); }
        .icon-Meat { width: 35px; height: 25px; background: #a52a2a; border-radius: 50% 20% 50% 20%; border: 2px solid #5a1a1a; }
        .icon-CookedMeat { width: 35px; height: 25px; background: #8b4513; border-radius: 50% 20% 50% 20%; border: 2px solid #3d210e; }
        .icon-Campfire { width: 40px; height: 40px; background: radial-gradient(circle, #ff4500 20%, #8b4513 80%); border-radius: 50%; border: 3px solid #333; position: relative; }
        .icon-Campfire::after { content: '🔥'; position: absolute; top: 2px; left: 8px; font-size: 20px; }
        .icon-Workbench { width: 45px; height: 30px; background: #5d2e0a; border-top: 5px solid #8b4513; border-radius: 2px; position: relative; }
        .icon-Workbench::after { content: '🛠️'; position: absolute; top: 0; left: 12px; font-size: 16px; }
        .icon-StoneAxe { width: 40px; height: 40px; position: relative; }
        .icon-StoneAxe::before { content: ''; position: absolute; top: 10px; left: 18px; width: 6px; height: 25px; background: #5d2e0a; transform: rotate(-45deg); }
        .icon-StoneAxe::after { content: ''; position: absolute; top: 5px; left: 10px; width: 18px; height: 12px; background: #888; border-radius: 3px; transform: rotate(-45deg); }
        .icon-Backpack { width: 40px; height: 45px; background: #a0522d; border-radius: 8px; position: relative; border: 2px solid #5d2e0a; }
        .icon-Backpack::after { content: ''; position: absolute; top: 5px; left: 5px; width: 30px; height: 15px; background: #8b4513; border-radius: 3px; }
        .icon-StorageBox { width: 40px; height: 35px; background: #6d3b1a; border-radius: 4px; border: 2px solid #3d210e; }
        .icon-WoodFoundation { width: 45px; height: 10px; background: #8b4513; border: 2px solid #5d2e0a; }
        .icon-WoodWall { width: 10px; height: 45px; background: #8b4513; border: 2px solid #5d2e0a; }
        .icon-WoodRoof { width: 45px; height: 15px; background: #a0522d; border: 2px solid #5d2e0a; transform: skewX(-20deg); }
        .icon-WoodDoorway { width: 14px; height: 45px; background: #8b4513; border: 2px solid #5d2e0a; position: relative; }
        .icon-WoodDoorway::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 6px; height: 24px; background: #222; border-radius: 2px 2px 0 0; }
        .icon-WoodDoor { width: 12px; height: 40px; background: #a0522d; border: 2px solid #6d3b1a; border-radius: 2px 2px 0 0; position: relative; }
        .icon-WoodDoor::after { content: ''; position: absolute; top: 50%; right: 3px; width: 3px; height: 3px; background: #ffd700; border-radius: 50%; }
        .icon-Torch { width: 15px; height: 45px; background: #5d2e0a; border-radius: 2px; position: relative; }
        .icon-Torch::after { content: '🔥'; position: absolute; top: -10px; left: -5px; font-size: 20px; }
        .icon-PointyStick { width: 5px; height: 50px; background: #8b4513; border-radius: 50%; transform: rotate(45deg); }
        .icon-Shirt { width: 40px; height: 40px; background: #6495ed; border-radius: 5px; border: 2px solid #3a5fcd; }
        .icon-Pants { width: 35px; height: 45px; background: #556b2f; border-radius: 3px; border: 2px solid #3d4d21; }
        .icon-Shrub { width: 30px; height: 30px; background: radial-gradient(circle, #33aa33 30%, #228b22 100%); border-radius: 50% 50% 40% 40%; border: 2px solid #1a6b1a; }
        .icon-Leaves { width: 35px; height: 30px; background: radial-gradient(circle, #22aa22 20%, #114d11 100%); border-radius: 50%; border: 2px solid #0a3a0a; position: relative; }
        .icon-Leaves::after { content: '🍃'; position: absolute; top: 2px; left: 8px; font-size: 16px; }
        .icon-Hat { width: 40px; height: 25px; background: #8b6914; border-radius: 50% 50% 10% 10%; border: 2px solid #6b4f0a; position: relative; }
        .icon-Hat::after { content: ''; position: absolute; top: 8px; left: -4px; width: 48px; height: 10px; background: #a07818; border-radius: 50%; }

        #drag-icon { position: fixed; pointer-events: none; z-index: 100000; display: none; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); width: 60px; height: 60px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 50; }

        #player-ui { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 250px; height: 25px; background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 12px; overflow: hidden; z-index: 1000; }
        #player-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4b2b, #ff416c); transition: width 0.3s; }
        #target-ui { position: absolute; top: 60%; left: 50%; transform: translate(-50%, 0); width: 180px; height: 15px; background: rgba(0,0,0,0.6); border: 1px solid #ff4444; border-radius: 8px; overflow: hidden; display: none; z-index: 1000; }
        #target-hp-bar { width: 100%; height: 100%; background: #ff4444; transition: width 0.2s; }
        #boar-ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); color: #ff4444; padding: 10px; border-radius: 8px; font-weight: bold; display: none; border: 1px solid #ff4444; pointer-events: none; z-index: 1000; }

        .recipe-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); margin: 8px 0; padding: 10px; border-radius: 8px; border: 1px solid #333; cursor: pointer; }
        .recipe-item:hover { border-color: #ffd700; background: rgba(255,215,0,0.05); }
        .recipe-info { display: flex; align-items: center; gap: 10px; color: #eee; font-weight: bold; }

        /* Admin Panel */
        #admin-panel {
            display: none; margin-top: 20px; width: 560px; max-height: 500px; overflow-y: auto; overflow-x: hidden;
            background: rgba(30,30,30,0.95); border: 2px solid #ff6600; border-radius: 12px; padding: 20px;
            scrollbar-width: thin; scrollbar-color: #ff6600 #1a1a1a;
        }
        #admin-panel::-webkit-scrollbar { width: 8px; }
        #admin-panel::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
        #admin-panel::-webkit-scrollbar-thumb { background: #ff6600; border-radius: 4px; }
        #admin-panel h3 { color: #ff6600; margin: 0 0 14px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .spawn-block { margin: 0 0 10px 0; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid #333; }
        .spawn-block-title { color: #eee; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .spawn-slider-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .spawn-slider-row span.spawn-label { color: #aaa; font-size: 12px; min-width: 80px; }
        .spawn-slider-row input[type=range] { flex: 1; height: 6px; accent-color: #ff6600; cursor: pointer; }
        .spawn-slider-row .spawn-val { color: #ff6600; font-size: 12px; font-weight: bold; min-width: 55px; text-align: right; }
        /* Give Item Section */
        .give-section { margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid #333; }
        .give-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .give-row select { flex: 1; padding: 8px; background: #222; color: #eee; border: 1px solid #555; border-radius: 6px; font-size: 12px; font-family: inherit; cursor: pointer; }
        .give-row select:focus { border-color: #ff6600; outline: none; }
        .give-row input[type=number] { width: 60px; padding: 8px; background: #222; color: #eee; border: 1px solid #555; border-radius: 6px; font-size: 12px; text-align: center; font-family: inherit; }
        .give-row input[type=number]:focus { border-color: #ff6600; outline: none; }
        #btn-give { padding: 8px 16px; background: #ff6600; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        #btn-give:hover { background: #ff8833; }
    </style>
</head>
<body>
    <div id="player-ui"><div id="player-hp-bar"></div></div>
    <div id="target-ui"><div id="target-hp-bar"></div></div>
    <div id="boar-ui">Boar: Neutral</div>

    <div id="toolbar"><div id="toolbar-grid" style="display:flex; gap:10px"></div></div>

    <!-- Backpack Window: 3x4 = 12 slots, with [X] close -->
    <div id="bag-window" class="draggable">
        <div class="win-header"><span>Backpack Storage</span><span class="win-close" data-win="bag">[ X ]</span></div>
        <div id="bag-grid"></div>
    </div>

    <!-- Storage Box Window, with [X] close -->
    <div id="box-window" class="draggable">
        <div class="win-header"><span>Storage Box</span><span class="win-close" data-win="box">[ X ]</span></div>
        <div id="box-grid"></div>
    </div>

    <!-- Character/Equipment Window, with [X] close -->
    <div id="equip-window" class="draggable" style="top: 100px; left: 100px; transform: none;">
        <div class="win-header"><span>Character</span><span class="win-close" data-win="equip">[ X ]</span></div>
        <div class="paperdoll-area">
            <!-- Human silhouette -->
            <div class="pd-head"></div>
            <div class="pd-neck"></div>
            <div class="pd-torso"></div>
            <div class="pd-arm-l"></div>
            <div class="pd-arm-r"></div>
            <div class="pd-hand-l"></div>
            <div class="pd-hand-r"></div>
            <div class="pd-waist"></div>
            <div class="pd-leg-l"></div>
            <div class="pd-leg-r"></div>
            <div class="pd-foot-l"></div>
            <div class="pd-foot-r"></div>
            <!-- Equipment slots over body parts -->
            <div id="slot-head" class="equip-slot" style="top:10px; left:140px;" data-label="HEAD"></div>
            <div id="slot-torso" class="equip-slot" style="top:100px; left:140px;" data-label="TORSO"></div>
            <div id="slot-armor" class="equip-slot" style="top:100px; left:15px;" data-label="ARMOR"></div>
            <div id="slot-back" class="equip-slot" style="top:100px; right:15px;" data-label="BACK"></div>
            <div id="slot-lhand" class="equip-slot" style="top:195px; left:15px;" data-label="L-HAND"></div>
            <div id="slot-rhand" class="equip-slot" style="top:195px; right:15px;" data-label="R-HAND"></div>
            <div id="slot-legs" class="equip-slot" style="top:265px; left:140px;" data-label="LEGS"></div>
            <div id="slot-feet" class="equip-slot" style="top:355px; left:140px;" data-label="FEET"></div>
            <!-- Labels positioned below the doll -->
            <div style="position:absolute; bottom:8px; width:100%; text-align:center; font-size:10px; color:#555;">⌨ I — Toggle Character</div>
        </div>
    </div>

    <!-- Pockets Window: 2x2 = 4 slots, with [X] close -->
    <div id="pockets-window" class="draggable" style="border-color:#6d3b1a; top: auto; bottom: 100px; left: 100px; transform: none;">
        <div class="win-header"><span>Pants Pockets</span><span class="win-close" data-win="pockets">[ X ]</span></div>
        <div style="display: grid; grid-template-columns: repeat(2, 65px); gap: 10px;">
            <div id="pocket-0" class="slot"></div>
            <div id="pocket-1" class="slot"></div>
            <div id="pocket-2" class="slot"></div>
            <div id="pocket-3" class="slot"></div>
        </div>
    </div>

    <!-- Crafting Window, with [X] close -->
    <div id="craft-window" class="draggable">
        <div class="win-header"><span id="craft-title">Crafting</span><span class="win-close" data-win="craft">[ X ]</span></div>
        <div id="recipe-list"></div>
    </div>

    <div id="drag-icon"></div>
    <div id="crosshair"></div>
    <div id="pickup-progress-container" style="display:none; position:absolute; top:52%; left:50%; transform:translate(-50%, -50%); width:60px; height:6px; background:rgba(0,0,0,0.6); border:1px solid #fff; z-index:1000; pointer-events:none; border-radius:3px; overflow:hidden;">
        <div id="pickup-progress-bar" style="width:0%; height:100%; background:#ffd700;"></div>
    </div>
    <div id="place-ui" style="position:absolute; bottom:180px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:#ffd700; padding:8px 16px; border-radius:8px; border:1px solid #ffd700; font-size:12px; font-weight:bold; display:none; z-index:1000; text-align:center; pointer-events:none;">PLACEMENT MODE<br><span style="font-size:10px; color:#aaa;">Left Click = Place  |  Right Click / Esc = Cancel</span></div>

    <!-- Main Menu -->
    <div id="main-menu" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow-y:auto;">
        <h1 style="color:#cd853f; font-size:48px; margin-bottom:40px;">WANDERER 3D</h1>
        <div style="display:flex; flex-direction:column; gap:20px; width:300px;">
            <button id="btn-start" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#8b4513; color:white; border:none;">START ADVENTURE</button>
            <button id="btn-resume" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#cd853f; color:white; border:none; display:none;">RESUME</button>
            <button id="btn-save" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#444; color:white; border:none;">SAVE GAME</button>
            <button id="btn-load" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#444; color:white; border:none;">LOAD GAME</button>
            <button id="btn-quit" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#333; color:#888; border:none;">QUIT TO MENU</button>
            <button id="btn-admin" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#1a1a1a; color:#ff6600; border:1px solid #ff6600;">⚙ ADMIN SETTINGS</button>
        </div>
        <div id="admin-panel">
            <h3>⚙ Spawn Rate Configuration</h3>
            <div id="spawn-controls"></div>
            <h3 style="margin-top:16px;">📦 Give Item</h3>
            <div class="give-section">
                <div class="give-row">
                    <select id="give-item-select"></select>
                    <input type="number" id="give-item-count" min="1" max="999" value="1">
                    <button id="btn-give">GIVE</button>
                </div>
                <div id="give-feedback" style="color:#66ff66; font-size:11px; margin-top:6px; min-height:16px;"></div>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        /* ===== DISPLAY NAMES ===== */
        const itemDisplayNames = {
            Wood: 'Wood',
            Rock: 'Rock',
            Leather: 'Leather',
            Meat: 'Raw Meat',
            CookedMeat: 'Cooked Meat',
            Campfire: 'Campfire',
            Workbench: 'Workbench',
            StoneAxe: 'Stone Axe',
            Backpack: 'Backpack',
            StorageBox: 'Storage Box',
            WoodFoundation: 'Wood Foundation',
            WoodWall: 'Wood Wall',
            WoodRoof: 'Wood Roof',
            WoodDoorway: 'Wood Doorway',
            WoodDoor: 'Wood Door',
            Torch: 'Torch',
            PointyStick: 'Pointy Stick',
            Shirt: 'Shirt',
            Pants: 'Pants',
            Leaves: 'Leaves',
            Shrub: 'Shrub',
            Hat: 'Hat'
        };
        function getDisplayName(type) { return itemDisplayNames[type] || type; }

        /* ===== TERRAIN GENERATION ===== */
        function hash(x, y) {
            let h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise(x, y) {
            const ix = Math.floor(x), iy = Math.floor(y);
            const fx = x - ix, fy = y - iy;
            const ux = fx * fx * (3.0 - 2.0 * fx), uy = fy * fy * (3.0 - 2.0 * fy);
            const v1 = hash(ix, iy), v2 = hash(ix + 1, iy);
            const v3 = hash(ix, iy + 1), v4 = hash(ix + 1, iy + 1);
            return (v1 * (1 - ux) + v2 * ux) * (1 - uy) + (v3 * (1 - ux) + v4 * ux) * uy;
        }
        function fbm(x, y, octaves = 4) {
            let val = 0, amp = 1, freq = 1, max = 0;
            for (let i = 0; i < octaves; i++) {
                val += noise(x * freq, y * freq) * amp;
                max += amp;
                amp *= 0.5; freq *= 2.0;
            }
            return val / max;
        }
        function getElevation(x, z) {
            const baseNoise = fbm(x * 0.0015, z * 0.0015, 5); // Mountains & Hills
            let elevation = Math.pow(baseNoise, 2.0) * 150 - 5;

            // Carve rivers
            const riverNoise = fbm(x * 0.002 - 50, z * 0.002 - 50, 3);
            const riverDist = Math.abs(riverNoise - 0.5) * 2.0;
            if (riverDist < 0.1) {
                const carve = (0.1 - riverDist) * 10; // 0 to 1
                elevation -= carve * 15;
            }

            // Sea coast on the east (X > 600)
            if (x > 600) {
                elevation -= (x - 600) * 0.25;
            }
            return elevation;
        }

        /* ===== STATS CLASS ===== */
        class Stats {
            constructor(maxHp) { this.maxHp = maxHp; this.hp = maxHp; }
            takeDamage(amt) { this.hp = Math.max(0, this.hp - amt); return this.hp <= 0; }
            heal(amt) { this.hp = Math.min(this.maxHp, this.hp + amt); }
        }
        const playerStats = new Stats(100);

        /* ===== BOAR CLASS ===== */
        class Boar {
            constructor() {
                this.group = new THREE.Group();
                // Body
                const body = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 6), new THREE.MeshPhongMaterial({ color: 0x4b3621 }));
                body.castShadow = true;
                this.group.add(body);
                // Head
                const head = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), new THREE.MeshPhongMaterial({ color: 0x3b2611 }));
                head.position.set(0, 0.5, 3.5);
                this.group.add(head);
                // Tusks
                const tusks = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 0.5), new THREE.MeshPhongMaterial({ color: 0xeeeeee }));
                tusks.position.set(0, -0.2, 4.5);
                head.add(tusks);

                const spawn = getValidSpawn();
                const x = spawn ? spawn.x : 0;
                const z = spawn ? spawn.z : 0;
                this.group.position.set(x, Math.max(getElevation(x, z), -2) + 1.5, z);
                scene.add(this.group);
                this.stats = new Stats(5);
                this.state = 'WANDER';
                this.targetAngle = Math.random() * Math.PI * 2;
                this.lastChange = 0;
                this.attackCooldown = 0;
            }

            update(time, playerPos) {
                const dist = this.group.position.distanceTo(playerPos);
                
                let speed = this.state === 'AGGRESSIVE' ? 0.3 : 0.1;
                const moveDir = new THREE.Vector3();

                if (this.state === 'AGGRESSIVE') {
                    moveDir.subVectors(playerPos, this.group.position).normalize();
                    this.group.lookAt(playerPos.x, this.group.position.y, playerPos.z);
                    if (dist < 8 && time > this.attackCooldown) {
                        playerStats.takeDamage(10);
                        updateUI();
                        playSfx(100, 'sawtooth', 0.3, 0.2);
                        this.attackCooldown = time + 1500;
                    }
                } else {
                    if (time - this.lastChange > 3000) {
                        this.targetAngle = Math.random() * Math.PI * 2;
                        this.lastChange = time;
                    }
                    this.group.rotation.y = THREE.MathUtils.lerp(this.group.rotation.y, this.targetAngle, 0.02);
                    moveDir.set(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), this.group.rotation.y);
                }

                const nextX = this.group.position.x + moveDir.x * speed;
                const nextZ = this.group.position.z + moveDir.z * speed;
                const nextElev = getElevation(nextX, nextZ);

                if (nextElev < -3) { // Avoid deep water
                    if (this.state === 'WANDER') {
                        this.targetAngle += Math.PI; // Turn around
                        this.lastChange = time;
                    }
                } else {
                    this.group.position.x = nextX;
                    this.group.position.z = nextZ;
                    this.group.position.y = Math.max(nextElev, -2) + 1.5;
                }

                if (dist < 40) {
                    document.getElementById('boar-ui').style.display = 'block';
                    document.getElementById('boar-ui').innerText = "Boar: Neutral";
                } else if (dist > 100) {
                    document.getElementById('boar-ui').style.display = 'none';
                }
            }

            takeDamage() {
                this.state = 'AGGRESSIVE';
                playSfx(200, 'sawtooth', 0.2, 0.2);
                if (this.stats.takeDamage(1)) {
                    this.dropLoot();
                    scene.remove(this.group);
                    return true;
                }
                return false;
            }

            dropLoot() {
                [{ type: 'Meat', c: 0xa52a2a, s: [1, 0.5, 1.5] }, { type: 'Leather', c: 0xc19a6b, s: [1.2, 0.1, 1.5] }].forEach(d => {
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshPhongMaterial({ color: d.c }));
                    mesh.scale.set(...d.s);
                    mesh.position.copy(this.group.position);
                    mesh.position.x += Math.random() * 4 - 2;
                    mesh.position.z += Math.random() * 4 - 2;
                    mesh.position.y = Math.max(getElevation(mesh.position.x, mesh.position.z), -2) + 1;
                    mesh.itemType = d.type;
                    mesh.castShadow = true;
                    scene.add(mesh);
                    objects.push(mesh);
                });
            }
        }

        /* ===== AUDIO ===== */
        let audioCtx;
        function playSfx(freq, type, dur, vol) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        /* ===== UI INITIALIZATION ===== */
        // Toolbar order: L-HAND, ACT1, ACT2, ACT3, R-HAND

            { id: 'toolbar-slot-1', label: 'ACT 1', type: 'action', pocketIdx: 0, key: '1' },

            const tbg = document.getElementById('toolbar-grid');

            toolbarLayout.forEach((def, i) => {

        /* ===== SLOT CLICK HANDLER ===== */
        function handleSlotClick(idx, e) {
            playSfx(800, 'sine', 0.1, 0.1);
            let arr = inventorySlots;
            let actualIdx = idx;

            // Storage box slots (16+)
            if (idx >= 16) {
                if (!openBoxId) return;
                arr = placedBoxes[openBoxId];
                actualIdx = idx - 16;
            }

            // Pockets require pants
            if (idx < 4 && !equipmentSlots.legs) { playSfx(100, 'square', 0.1, 0.1); return; }
            // Backpack slots require backpack
            if (idx >= 4 && idx < 16 && !equipmentSlots.back) { playSfx(100, 'square', 0.1, 0.1); return; }

            // Right-click to consume
            if (e && (e.button === 2 || e.ctrlKey)) {
                const item = arr[actualIdx];
                if (item && item.type === 'CookedMeat') {
                    playerStats.heal(30);
                    item.count--;
                    if (item.count <= 0) arr[actualIdx] = null;
                    updateUI();
                }
                return;
            }

            // Pick up or swap
            if (!heldItem) {
                if (arr[actualIdx]) {
                    heldItem = { ...arr[actualIdx], fromIndex: idx };
                    arr[actualIdx] = null;
                    if (e) {
                        const di = document.getElementById('drag-icon');
                        di.style.left = e.clientX + 'px';
                        di.style.top = e.clientY + 'px';
                    }
                }
            } else {
                const target = arr[actualIdx];
                if (!target) {
                    arr[actualIdx] = { ...heldItem };
                    heldItem = null;
                } else if (target.type === heldItem.type && !['StorageBox', 'Pants', 'Backpack'].includes(target.type)) {
                    target.count += heldItem.count;
                    heldItem = null;
                } else {
                    const tmp = arr[actualIdx];
                    arr[actualIdx] = { ...heldItem };
                    heldItem = { ...tmp, fromIndex: idx };
                }
            }
            updateUI();
        }

        /* ===== EQUIP CLICK HANDLER ===== */
        function handleEquipClick(slot) {
            playSfx(800, 'sine', 0.1, 0.1);
            const weapons = ['StoneAxe', 'PointyStick', 'Torch'];

            if (!heldItem) {
                if (equipmentSlots[slot]) {
                    heldItem = { ...equipmentSlots[slot], fromIndex: -1 };
                    equipmentSlots[slot] = null;
                }
            } else {
                // Validate equipment type for slot
                if (slot === 'back' && heldItem.type !== 'Backpack') return;
                if (slot === 'head' && heldItem.type !== 'Hat') return;
                if (slot === 'torso' && heldItem.type !== 'Shirt') return;
                if (slot === 'legs' && heldItem.type !== 'Pants') return;
                if ((slot === 'lhand' || slot === 'rhand') && !weapons.includes(heldItem.type)) return;

                const tmp = equipmentSlots[slot];
                equipmentSlots[slot] = { ...heldItem, count: 1 };
                heldItem.count--;
                if (heldItem.count <= 0) {
                    heldItem = tmp;
                    if (heldItem) heldItem.fromIndex = -1;
                }
            }

            // Show/hide bag and pockets windows based on equipment
            const bWin = document.getElementById('bag-window');
            const pWin = document.getElementById('pockets-window');
            if (slot === 'back' && bWin) bWin.style.display = equipmentSlots.back ? 'block' : 'none';
            if (slot === 'legs' && pWin) pWin.style.display = equipmentSlots.legs ? 'block' : 'none';
            updateUI();
        }

        /* ===== WINDOW TOGGLE ===== */
        function toggleWindow(type) {
            const wins = {
                bag: 'bag-window', box: 'box-window', craft: 'craft-window',
                equip: 'equip-window', menu: 'main-menu', pockets: 'pockets-window'
            };
            const target = document.getElementById(wins[type]);
            if (!target) return;
            const isVisible = target.style.display === 'block' || target.style.display === 'flex';

            if (isVisible) {
                target.style.display = 'none';
                if (type === 'equip') {
                    document.getElementById(wins.bag).style.display = 'none';
                    document.getElementById(wins.pockets).style.display = 'none';
                }
                if (type === 'box') { openBoxId = null; }
            } else {
                if (type === 'bag' && !equipmentSlots.back) return;
                if (type === 'pockets' && !equipmentSlots.legs) return;
                target.style.display = (type === 'menu' ? 'flex' : 'block');
                if (type === 'equip') {
                    if (equipmentSlots.legs) document.getElementById(wins.pockets).style.display = 'block';
                    if (equipmentSlots.back) document.getElementById(wins.bag).style.display = 'block';
                }
                if (type === 'craft') showCrafting('Hand');
            }

            // Lock/unlock pointer based on whether any window is open
            const anyOpen = Object.values(wins).some(id => {
                const el = document.getElementById(id);
                return el && (el.style.display === 'block' || el.style.display === 'flex');
            });
            if (anyOpen) controls.unlock();
            else controls.lock();
        }

        /* ===== GAME START/SAVE/LOAD ===== */
        function startGame() {
            ['bag-window', 'box-window', 'craft-window', 'equip-window', 'main-menu', 'pockets-window'].forEach(id =>
                document.getElementById(id).style.display = 'none'
            );
            document.getElementById('btn-resume').style.display = 'block';
            if (controls) controls.lock();
        }

        function saveGame() {
            const world = objects.filter(o => o.itemType).map(o => ({
                type: o.itemType, pos: { x: o.position.x, y: o.position.y, z: o.position.z },
                rot: { x: o.rotation.x, y: o.rotation.y, z: o.rotation.z },
                scl: { x: o.scale.x, y: o.scale.y, z: o.scale.z },
                boxId: o.boxId, stationType: o.stationType,
                isOpen: o.userData ? o.userData.isOpen : undefined,
                pivotRot: o.itemType === 'WoodDoor' ? o.children[0].rotation.y : undefined
            }));
            const pos = controls.getObject().position;
            const save = {
                player: { hp: playerStats.hp, pos: { x: pos.x, y: pos.y, z: pos.z } },
                inventory: inventorySlots, equipment: equipmentSlots, world, boxes: placedBoxes
            };
            localStorage.setItem('wanderer_save', JSON.stringify(save));
            alert("Game Saved!");
        }

        function loadGame() {
            const raw = localStorage.getItem('wanderer_save');
            if (!raw) { alert("No save found."); return; }
            const data = JSON.parse(raw);
            playerStats.hp = data.player.hp;
            const p = controls.getObject().position;
            p.set(data.player.pos.x, data.player.pos.y, data.player.pos.z);

            data.inventory.forEach((s, i) => inventorySlots[i] = s);
            Object.assign(equipmentSlots, data.equipment);
            Object.assign(placedBoxes, data.boxes);

            // Clear existing world objects
            objects.forEach(o => scene.remove(o));
            objects.length = 0;

            // Rebuild world
            data.world.forEach(d => {
                let mesh;
                if (d.type === 'WoodFoundation') {
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(20, 2, 20), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
                } else if (d.type === 'WoodWall') {
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(20, 20, 2), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
                } else if (d.type === 'WoodRoof') {
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(20, 2, 20), new THREE.MeshPhongMaterial({ color: 0xa0522d }));
                } else if (d.type === 'WoodDoorway') {
                    mesh = buildDoorwayMesh();
                } else if (d.type === 'WoodDoor') {
                    mesh = buildDoorMesh();
                    if (d.isOpen !== undefined) {
                        mesh.userData.isOpen = d.isOpen;
                        if (d.isOpen) mesh.children[0].rotation.y = d.pivotRot !== undefined ? d.pivotRot : Math.PI / 2;
                    }
                } else if (d.type === 'Wood') {
                    mesh = new THREE.Mesh(
                        new THREE.CylinderGeometry(1, 1.5, 10, 8),
                        new THREE.MeshPhongMaterial({ color: 0x4d2911 })
                    );
                } else if (d.type === 'Leaves') {
                    mesh = new THREE.Mesh(
                        new THREE.DodecahedronGeometry(5),
                        new THREE.MeshPhongMaterial({ color: 0x114d11 })
                    );
                } else if (d.type === 'Rock') {
                    mesh = new THREE.Mesh(
                        new THREE.DodecahedronGeometry(3),
                        new THREE.MeshPhongMaterial({ color: 0x888888, flatShading: true })
                    );
                } else if (d.type === 'Shrub') {
                    mesh = new THREE.Mesh(
                        new THREE.DodecahedronGeometry(2),
                        new THREE.MeshPhongMaterial({ color: 0x228b22 })
                    );
                } else {
                    let color = 0x6d3b1a;
                    if (d.type === 'Campfire') color = 0x8b4513;
                    if (d.type === 'Workbench') color = 0x5d2e0a;
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 6), new THREE.MeshPhongMaterial({ color }));
                    if (d.type === 'StorageBox') {
                        mesh.geometry = new THREE.BoxGeometry(6, 6, 6);
                        const lid = new THREE.Mesh(new THREE.BoxGeometry(6.5, 1.2, 6.5), new THREE.MeshPhongMaterial({ color: 0x3d210e }));
                        lid.position.y = 3;
                        mesh.add(lid);
                    } else if (d.type === 'Campfire') {
                        const fireMesh = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff4500 }));
                        fireMesh.position.y = 2;
                        mesh.add(fireMesh);
                    } else if (d.type === 'Workbench') {
                        const top = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 4), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
                        top.position.y = 3;
                        mesh.add(top);
                    }
                }
                mesh.position.set(d.pos.x, d.pos.y, d.pos.z);
                mesh.rotation.set(d.rot.x, d.rot.y, d.rot.z);
                if (d.scl) mesh.scale.set(d.scl.x, d.scl.y, d.scl.z);
                mesh.itemType = d.type;
                mesh.boxId = d.boxId;
                mesh.stationType = d.stationType;
                mesh.castShadow = true;
                scene.add(mesh);
                objects.push(mesh);
            });
            updateUI();
            startGame();
        }

        /* ===== CRAFTING ===== */
        function showCrafting(station) {
            const list = document.getElementById('recipe-list');
            const title = document.getElementById('craft-title');
            if (!list) return;
            list.innerHTML = '';
            title.innerText = station === 'Hand' ? 'Hand Crafting' : station;
            (recipes[station] || []).forEach(recipe => {
                const div = document.createElement('div');
                div.className = 'recipe-item';
                const name = getDisplayName(recipe.result);
                const costs = Object.entries(recipe.cost).map(([k, v]) => `${v} ${getDisplayName(k)}`).join(', ');
                div.innerHTML = `<div class="recipe-info"><div class="icon-${recipe.result}" style="transform:scale(0.6)"></div> ${name}</div><div style="font-size:10px; color:#666">Costs: ${costs}</div>`;
                div.title = `Craft ${name} — Requires: ${costs}`;
                div.addEventListener('click', () => craftItem(recipe));
                list.appendChild(div);
            });
            document.getElementById('craft-window').style.display = 'block';
        }

        function craftItem(recipe) {
            // Check costs
            for (const [key, val] of Object.entries(recipe.cost)) {
                let total = inventorySlots.reduce((acc, s) => (s && s.type === key) ? acc + s.count : acc, 0);
                if (total < val) return;
            }
            // Deduct costs
            for (const [key, val] of Object.entries(recipe.cost)) {
                let remaining = val;
                for (let i = 0; i < 16; i++) {
                    if (inventorySlots[i] && inventorySlots[i].type === key) {
                        const take = Math.min(inventorySlots[i].count, remaining);
                        inventorySlots[i].count -= take;
                        remaining -= take;
                        if (inventorySlots[i].count <= 0) inventorySlots[i] = null;
                        if (remaining <= 0) break;
                    }
                }
            }
            // Add result: stack or new slot
            let placed = false;
            for (let i = 0; i < 16; i++) {
                if (inventorySlots[i] && inventorySlots[i].type === recipe.result) {
                    inventorySlots[i].count++;
                    placed = true;
                    break;
                }
            }
            if (!placed) {
                for (let i = 0; i < 16; i++) {
                    if (!inventorySlots[i]) {
                        inventorySlots[i] = { type: recipe.result, count: 1 };
                        placed = true;
                        break;
                    }
                }
            }
            playSfx(1000, 'sine', 0.2, 0.2);
            updateUI();
        }

        /* ===== UPDATE UI ===== */
        function updateUI() {
            // Health bar
            document.getElementById('player-hp-bar').style.width = playerStats.hp + '%';

            // Inventory slots 0-15
            for (let i = 0; i < 16; i++) {
                const domSlots = [document.getElementById(`slot-${i}`)];
                if (i < 4) domSlots.push(document.getElementById(`pocket-${i}`));
                // Map pocket slots 0-2 to toolbar ACT slots (toolbar-slot-1, -2, -3)
                if (i < 3) domSlots.push(document.getElementById(`toolbar-slot-${i + 1}`));

                domSlots.forEach(s => {
                    if (!s) return;
                    const isLocked = (i < 4 && !equipmentSlots.legs) || (i >= 4 && !equipmentSlots.back);
                    s.classList.toggle('disabled', isLocked);
                    // Preserve toolbar labels
                    const existingLabel = s.querySelector('.toolbar-label');
                    s.innerHTML = '';
                    if (existingLabel) s.appendChild(existingLabel);

                    const item = inventorySlots[i];
                    if (item) {
                        const name = getDisplayName(item.type);
                        const icon = document.createElement('div');
                        icon.className = `icon-${item.type}`;
                        s.title = name;
                        const count = document.createElement('div');
                        count.className = 'item-count';
                        count.textContent = item.count;
                        const label = document.createElement('div');
                        label.className = 'item-label';
                        label.textContent = name;
                        s.appendChild(icon);
                        s.appendChild(count);
                        s.appendChild(label);
                    } else {
                        s.title = '';
                    }
                });
            }

            // Toolbar hand slots (slot-0=L-HAND, slot-4=R-HAND)
            [['lhand', 'toolbar-slot-0', 'L-HAND'], ['rhand', 'toolbar-slot-4', 'R-HAND']].forEach(([slot, domId, labelText]) => {
                const s = document.getElementById(domId);
                if (!s) return;
                s.innerHTML = `<div class="toolbar-label">${labelText}</div>`;
                if (equipmentSlots[slot]) {
                    const name = getDisplayName(equipmentSlots[slot].type);
                    const icon = document.createElement('div');
                    icon.className = `icon-${equipmentSlots[slot].type}`;
                    s.title = name;
                    const label = document.createElement('div');
                    label.className = 'item-label';
                    label.textContent = name;
                    s.appendChild(icon);
                    s.appendChild(label);
                } else {
                    s.title = '';
                }
            });

            // Equipment paper doll slots
            ['back', 'armor', 'lhand', 'rhand', 'head', 'torso', 'legs', 'feet'].forEach(slot => {
                const el = document.getElementById(`slot-${slot}`);
                if (!el) return;
                el.innerHTML = '';
                if (equipmentSlots[slot]) {
                    const name = getDisplayName(equipmentSlots[slot].type);
                    const icon = document.createElement('div');
                    icon.className = `icon-${equipmentSlots[slot].type}`;
                    el.title = name;
                    const label = document.createElement('div');
                    label.className = 'item-label';
                    label.textContent = name;
                    el.appendChild(icon);
                    el.appendChild(label);
                } else {
                    el.title = '';
                }
            });

            // 3D hand weapon models
            const updateHand = (slot, model) => {
                if (!model) return;
                while (model.children.length > 0) model.remove(model.children[0]);
                const item = equipmentSlots[slot];
                if (item) {
                    let geo = null;
                    const mat = new THREE.MeshPhongMaterial({ color: 0x8b4513 });
                    if (item.type === 'StoneAxe') {
                        geo = new THREE.CylinderGeometry(0.1, 0.2, 5);
                    } else if (item.type === 'PointyStick') {
                        geo = new THREE.CylinderGeometry(0.05, 0.05, 8);
                    } else if (item.type === 'Torch') {
                        geo = new THREE.CylinderGeometry(0.15, 0.15, 4);
                        const fireMesh = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
                        fireMesh.position.y = 2;
                        model.add(fireMesh);
                        const fireLight = new THREE.PointLight(0xffaa00, 100, 50);
                        fireLight.position.y = 2;
                        model.add(fireLight);
                    }
                    if (geo) {
                        const weaponMesh = new THREE.Mesh(geo, mat);
                        weaponMesh.rotation.x = Math.PI / 2;
                        model.add(weaponMesh);
                        model.visible = true;
                    }
                } else {
                    model.visible = false;
                }
            };
            if (leftWeapon && rightWeapon) {
                updateHand('lhand', leftWeapon);
                updateHand('rhand', rightWeapon);
            }

            // Storage box contents
            const bxw = document.getElementById('box-window');
            if (openBoxId && placedBoxes[openBoxId]) {
                for (let i = 0; i < 24; i++) {
                    const s = document.getElementById(`slot-${i + 16}`);
                    if (!s) continue;
                    s.innerHTML = '';
                    const item = placedBoxes[openBoxId][i];
                    if (item) {
                        const name = getDisplayName(item.type);
                        const icon = document.createElement('div');
                        icon.className = `icon-${item.type}`;
                        s.title = name;
                        const count = document.createElement('div');
                        count.className = 'item-count';
                        count.textContent = item.count;
                        const label = document.createElement('div');
                        label.className = 'item-label';
                        label.textContent = name;
                        s.appendChild(icon);
                        s.appendChild(count);
                        s.appendChild(label);
                    } else {
                        s.title = '';
                    }
                }
                bxw.style.display = 'block';
            } else {
                if (bxw) bxw.style.display = 'none';
            }

            // Drag icon
            const di = document.getElementById('drag-icon');
            if (heldItem) {
                const name = getDisplayName(heldItem.type);
                di.className = `icon-${heldItem.type}`;
                di.title = name;
                di.style.display = 'block';
            } else {
                di.style.display = 'none';
                di.title = '';
            }
        }

        /* ===== DRAGGABLE WINDOWS ===== */
        let dragTarget = null;
        const dragOffset = { x: 0, y: 0 };
        let topZ = 10000;

        document.addEventListener('mousedown', (e) => {
            const win = e.target.closest('.draggable');
            if (win) win.style.zIndex = ++topZ;
            const header = e.target.closest('.win-header');
            if (header && !e.target.classList.contains('win-close')) {
                dragTarget = header.parentElement;
                const rect = dragTarget.getBoundingClientRect();
                
                if (dragTarget.style.bottom) {
                    dragTarget.style.top = rect.top + 'px';
                    dragTarget.style.bottom = '';
                }
                if (dragTarget.style.right) {
                    dragTarget.style.left = rect.left + 'px';
                    dragTarget.style.right = '';
                }

                dragOffset.x = e.clientX - rect.left;
                dragOffset.y = e.clientY - rect.top;
            }
        });
        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            if (dragTarget) {
                if (dragTarget.style.transform === 'none') {
                    dragTarget.style.left = (e.clientX - dragOffset.x) + 'px';
                    dragTarget.style.top = (e.clientY - dragOffset.y) + 'px';
                } else {
                    dragTarget.style.left = (e.clientX - dragOffset.x + dragTarget.offsetWidth / 2) + 'px';
                    dragTarget.style.top = (e.clientY - dragOffset.y + dragTarget.offsetHeight / 2) + 'px';
                }
            }
            if (heldItem) {
                const di = document.getElementById('drag-icon');
                di.style.left = (e.clientX - 30) + 'px';
                di.style.top = (e.clientY - 30) + 'px';
            }
        });
        document.addEventListener('mouseup', () => { dragTarget = null; });
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        // Drop held item into the 3D world
        document.addEventListener('pointerup', (e) => {
            if (e.target.closest('.slot') || e.target.closest('.equip-slot') || e.target.closest('#main-menu') || e.target.closest('.win-close') || e.target.closest('.win-header') || e.target.closest('.draggable')) return;
            if (heldItem && controls && document.getElementById('main-menu').style.display === 'none') {
                const pos = controls.getObject().position;
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                const spawnX = pos.x + dir.x * 10;
                const spawnZ = pos.z + dir.z * 10;
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
                mesh.position.set(spawnX, Math.max(getElevation(spawnX, spawnZ), -2) + 1, spawnZ);
                mesh.itemType = heldItem.type;
                mesh.boxId = heldItem.boxId;
                mesh.castShadow = true;
                scene.add(mesh);
                objects.push(mesh);
                heldItem = null;
                updateUI();
            }
        });

        /* ===== INTERACT (E key) ===== */
        function toggleDoor(obj) {
            if (obj.userData.isOpen) {
                obj.children[0].rotation.y = 0;
                obj.userData.isOpen = false;
            } else {
                const localPos = obj.worldToLocal(controls.getObject().position.clone());
                // Rotate hinge to swing toward the player
                obj.children[0].rotation.y = localPos.z < 0 ? Math.PI / 2 : -Math.PI / 2;
                obj.userData.isOpen = true;
            }
            playSfx(350, 'sine', 0.15, 0.15);
        }

        /* ===== INTERACTION & PICKUP ===== */
        let isHoldingE = false;
        let holdTimer = 0;
        let currentInteractTarget = null;

        function getInteractTarget() {
            if (!controls || document.getElementById('main-menu').style.display !== 'none') return null;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const hitRay = new THREE.Raycaster(camera.position, dir, 0, 45);
            const hits = hitRay.intersectObjects(objects, true);
            if (hits.length > 0) {
                let target = hits[0].object;
                while (target.parent && target.parent.type !== 'Scene') {
                    if (target.itemType) return target;
                    target = target.parent;
                }
                if (target.itemType) return target;
            }
            return null;
        }

        function shortInteract(obj) {
            if (obj.itemType === 'WoodDoor' && obj.userData) {
                toggleDoor(obj);
            } else if (obj.boxId && obj.itemType === 'StorageBox') {
                openBoxId = obj.boxId;
                controls.unlock();
                updateUI();
            } else if (obj.stationType) {
                openStationType = obj.stationType;
                controls.unlock();
                showCrafting(obj.stationType);
            }
        }

        function pickUpItem(obj) {
            const type = obj.itemType;
            let placed = false;
            const unstackable = ['StorageBox', 'Campfire', 'Workbench', 'StoneAxe', 'Backpack',
                'WoodFoundation', 'WoodWall', 'WoodRoof', 'WoodDoorway', 'WoodDoor', 'Torch', 'PointyStick', 'Shirt', 'Pants', 'Hat'];

            if (unstackable.includes(type)) {
                for (let i = 0; i < 16; i++) {
                    if (!inventorySlots[i]) {
                        inventorySlots[i] = { type, count: 1, boxId: obj.boxId };
                        placed = true;
                        break;
                    }
                }
            } else {
                for (let i = 0; i < 16; i++) {
                    if (inventorySlots[i] && inventorySlots[i].type === type) {
                        inventorySlots[i].count++;
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    for (let i = 0; i < 16; i++) {
                        if (!inventorySlots[i]) {
                            inventorySlots[i] = { type, count: 1 };
                            placed = true;
                            break;
                        }
                    }
                }
            }

            if (placed) {
                scene.remove(obj);
                const idx = objects.indexOf(obj);
                if (idx > -1) objects.splice(idx, 1);
                playSfx(400, 'sine', 0.1, 0.1);
                updateUI();
            } else {
                playSfx(100, 'square', 0.1, 0.1); // Inventory full
            }
        }

        function checkCollision(playerBox) {
            let isHit = false;
            const playerCenter = new THREE.Vector3();
            playerBox.getCenter(playerCenter);

            for (const obj of objects) {
                if (!obj.itemType) continue;
                if (obj.position.distanceToSquared(playerCenter) > 900) continue;
                if (obj.itemType === 'Shrub' || obj.itemType === 'Leaves') continue; // Non-solid

                obj.traverse(child => {
                    if (isHit) return;
                    if (child.isMesh) {
                        const childBox = new THREE.Box3().setFromObject(child);
                        if (playerBox.intersectsBox(childBox)) isHit = true;
                    }
                });
                if (isHit) return true;
            }
            // Check boars
            for (const boar of boars) {
                if (boar.group.position.distanceToSquared(playerCenter) > 900) continue;
                boar.group.traverse(child => {
                    if (isHit) return;
                    if (child.isMesh) {
                        const childBox = new THREE.Box3().setFromObject(child);
                        if (playerBox.intersectsBox(childBox)) isHit = true;
                    }
                });
                if (isHit) return true;
            }
            return false;
        }

        function getGroundY(px, pz, currentY) {
            let maxGround = getElevation(px, pz) + 10; // Default floor camera height follows terrain
            const radius = 1.0;
            const playerFootBox = new THREE.Box3(
                new THREE.Vector3(px - radius, 0, pz - radius),
                new THREE.Vector3(px + radius, currentY - 7.5, pz + radius)
            );
            
            for (const obj of objects) {
                if (!obj.itemType) continue;
                if (obj.position.distanceToSquared(new THREE.Vector3(px, currentY, pz)) > 900) continue;
                if (['Shrub', 'Leaves', 'WoodDoorway', 'WoodDoor'].includes(obj.itemType)) continue;

                obj.traverse(child => {
                    if (child.isMesh) {
                        const childBox = new THREE.Box3().setFromObject(child);
                        if (playerFootBox.intersectsBox(childBox)) {
                            const surfaceCameraY = childBox.max.y + 10;
                            if (surfaceCameraY > maxGround && surfaceCameraY <= currentY + 2.5) {
                                maxGround = surfaceCameraY;
                            }
                        }
                    }
                });
            }
            return maxGround;
        }

        /* ===== USE ACTION SLOT (keys 1-3) ===== */
        const placeableItems = ['Campfire', 'Workbench', 'StorageBox', 'WoodFoundation', 'WoodWall', 'WoodRoof', 'WoodDoorway', 'WoodDoor'];
        let nextBoxId = 1;
        let placingType = null;   // item type being placed
        let placingSlotIdx = -1;  // inventory slot index of item being placed

        function cancelPlacement() {
            if (ghostMesh) {
                scene.remove(ghostMesh);
                ghostMesh = null;
            }
            placingType = null;
            placingSlotIdx = -1;
            document.getElementById('place-ui').style.display = 'none';
            document.getElementById('crosshair').style.borderColor = 'white';
        }

        function createGhostMesh(type) {
            let geo, color;
            if (type === 'WoodFoundation')    { geo = new THREE.BoxGeometry(20, 2, 20);  color = 0x8b4513; }
            else if (type === 'WoodWall')     { geo = new THREE.BoxGeometry(20, 20, 2);  color = 0x8b4513; }
            else if (type === 'WoodRoof')     { geo = new THREE.BoxGeometry(20, 2, 20);  color = 0xa0522d; }
            else if (type === 'Campfire')     { geo = new THREE.BoxGeometry(6, 2, 6);    color = 0x8b4513; }
            else if (type === 'Workbench')    { geo = new THREE.BoxGeometry(6, 2, 6);    color = 0x5d2e0a; }
            else if (type === 'StorageBox')   { geo = new THREE.BoxGeometry(6, 6, 6);    color = 0x6d3b1a; }
            else if (type === 'WoodDoorway')  { return createDoorwayGhost(); }
            else if (type === 'WoodDoor')     { return createDoorGhost(); }
            else return null;

            const mat = new THREE.MeshPhongMaterial({ color, transparent: true, opacity: 0.45, depthWrite: false });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.name = type;
            mesh.visible = false;
            return mesh;
        }

        function createDoorGhost() {
            const container = new THREE.Group();
            const pivot = new THREE.Group();
            pivot.position.set(-4, 0, 0);
            const mat = new THREE.MeshPhongMaterial({ color: 0xa0522d, transparent: true, opacity: 0.45, depthWrite: false });
            const panel = new THREE.Mesh(new THREE.BoxGeometry(8, 16, 0.8), mat);
            panel.position.set(4, 0, 0);
            pivot.add(panel);
            container.add(pivot);
            container.name = 'WoodDoor';
            container.visible = false;
            return container;
        }

        function createDoorwayGhost() {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0x8b4513, transparent: true, opacity: 0.45, depthWrite: false });
            // Left pillar
            const left = new THREE.Mesh(new THREE.BoxGeometry(6, 20, 2), mat);
            left.position.set(-7, 0, 0);
            group.add(left);
            // Right pillar
            const right = new THREE.Mesh(new THREE.BoxGeometry(6, 20, 2), mat);
            right.position.set(7, 0, 0);
            group.add(right);
            // Top beam (lintel)
            const top = new THREE.Mesh(new THREE.BoxGeometry(20, 4, 2), mat);
            top.position.set(0, 8, 0);
            group.add(top);
            group.name = 'WoodDoorway';
            group.visible = false;
            return group;
        }

        function buildDoorwayMesh() {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0x8b4513 });
            const left = new THREE.Mesh(new THREE.BoxGeometry(6, 20, 2), mat);
            left.position.set(-7, 0, 0); left.castShadow = true;
            group.add(left);
            const right = new THREE.Mesh(new THREE.BoxGeometry(6, 20, 2), mat);
            right.position.set(7, 0, 0); right.castShadow = true;
            group.add(right);
            const top = new THREE.Mesh(new THREE.BoxGeometry(20, 4, 2), mat);
            top.position.set(0, 8, 0); top.castShadow = true;
            group.add(top);
            return group;
        }

        function buildDoorMesh() {
            // Container sits at the center of the doorway
            const container = new THREE.Group();
            
            // Pivot sits at the left edge of the doorway hole
            const pivot = new THREE.Group();
            pivot.position.set(-4, 0, 0); // Inner edge of the left pillar
            
            // Panel spans from pivot to the right
            const panel = new THREE.Mesh(
                new THREE.BoxGeometry(8, 16, 0.8),
                new THREE.MeshPhongMaterial({ color: 0xa0522d })
            );
            panel.position.set(4, 0, 0);  // Center of the panel is 4 units from the pivot
            panel.castShadow = true;
            pivot.add(panel);
            
            // Handle (front)
            const handle = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 1.5, 1.5),
                new THREE.MeshPhongMaterial({ color: 0xffd700 })
            );
            handle.position.set(6.5, 0, 0.8);
            pivot.add(handle);
            
            // Handle (back)
            const handleBack = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 1.5, 1.5),
                new THREE.MeshPhongMaterial({ color: 0xffd700 })
            );
            handleBack.position.set(6.5, 0, -0.8);
            pivot.add(handleBack);
            
            // Interaction logic will rotate the pivot
            container.add(pivot);
            container.userData.isDoorContainer = true;
            container.userData.isOpen = false;
            
            return container;
        }

        function useActionSlot(pocketIdx) {
            if (!controls || document.getElementById('main-menu').style.display !== 'none') return;
            const item = inventorySlots[pocketIdx];
            if (!item) return;

            // Consumable: eat cooked meat
            if (item.type === 'CookedMeat') {
                playerStats.heal(30);
                playSfx(600, 'sine', 0.2, 0.15);
                item.count--;
                if (item.count <= 0) inventorySlots[pocketIdx] = null;
                updateUI();
                return;
            }

            // Torch: equip to left hand if empty, otherwise right hand
            if (item.type === 'Torch') {
                const target = !equipmentSlots.lhand ? 'lhand' : !equipmentSlots.rhand ? 'rhand' : null;
                if (target) {
                    equipmentSlots[target] = { type: 'Torch', count: 1 };
                    item.count--;
                    if (item.count <= 0) inventorySlots[pocketIdx] = null;
                    playSfx(500, 'sine', 0.15, 0.1);
                    updateUI();
                }
                return;
            }

            // Placeable items: enter placement mode (or cancel if already placing same type)
            if (placeableItems.includes(item.type)) {
                // Toggle off if already placing this item
                if (placingType === item.type && placingSlotIdx === pocketIdx) {
                    cancelPlacement();
                    return;
                }
                // Cancel any existing placement first
                cancelPlacement();

                // Create ghost and enter placement mode
                ghostMesh = createGhostMesh(item.type);
                if (ghostMesh) {
                    scene.add(ghostMesh);
                    placingType = item.type;
                    placingSlotIdx = pocketIdx;
                    playSfx(400, 'sine', 0.1, 0.1);
                    document.getElementById('place-ui').style.display = 'block';
                    document.getElementById('crosshair').style.borderColor = '#ffd700';
                }
                return;
            }
        }

        function confirmPlacement() {
            if (!ghostMesh || !placingType || !ghostMesh.visible) return;

            const type = placingType;
            const slotIdx = placingSlotIdx;
            const pos = ghostMesh.position.clone();
            const rot = ghostMesh.rotation.clone();

            // Remove ghost
            cancelPlacement();

            // Build the real mesh at the ghost position
            let mesh;

            if (type === 'WoodFoundation') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(20, 2, 20), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
            } else if (type === 'WoodWall') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(20, 20, 2), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
            } else if (type === 'WoodRoof') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(20, 2, 20), new THREE.MeshPhongMaterial({ color: 0xa0522d }));
            } else if (type === 'WoodDoorway') {
                mesh = buildDoorwayMesh();
            } else if (type === 'WoodDoor') {
                mesh = buildDoorMesh();
            } else if (type === 'Campfire') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 6), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
                const fireBall = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff4500 }));
                fireBall.position.y = 2;
                mesh.add(fireBall);
                const fireLight = new THREE.PointLight(0xff4500, 50, 40);
                fireLight.position.y = 3;
                mesh.add(fireLight);
                mesh.stationType = 'Campfire';
            } else if (type === 'Workbench') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 6), new THREE.MeshPhongMaterial({ color: 0x5d2e0a }));
                const top = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 4), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
                top.position.y = 1.5;
                mesh.add(top);
                mesh.stationType = 'Workbench';
            } else if (type === 'StorageBox') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), new THREE.MeshPhongMaterial({ color: 0x6d3b1a }));
                const lid = new THREE.Mesh(new THREE.BoxGeometry(6.5, 1.2, 6.5), new THREE.MeshPhongMaterial({ color: 0x3d210e }));
                lid.position.y = 3;
                mesh.add(lid);
                const boxId = 'box_' + nextBoxId++;
                mesh.boxId = boxId;
                placedBoxes[boxId] = new Array(24).fill(null);
            }

            if (!mesh) return;

            mesh.position.copy(pos);
            mesh.rotation.copy(rot);
            mesh.itemType = type;
            mesh.castShadow = true;
            scene.add(mesh);
            objects.push(mesh);

            // Consume item from inventory
            if (inventorySlots[slotIdx]) {
                inventorySlots[slotIdx].count--;
                if (inventorySlots[slotIdx].count <= 0) inventorySlots[slotIdx] = null;
            }

            playSfx(300, 'sine', 0.15, 0.15);
            updateUI();
        }

        /* ===== COMBAT HIT CHECK ===== */
        function checkCombatHit() {
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const hitRay = new THREE.Raycaster(camera.position, dir, 0, 15);

            // Check hitting trees/rocks
            const hits = hitRay.intersectObjects(objects, true);
            if (hits.length > 0) {
                const target = hits[0].object;
                if (target.itemType === 'Wood' || target.itemType === 'Leaves') {
                    // Add wood to inventory
                    for (let i = 0; i < 16; i++) {
                        if (inventorySlots[i] && inventorySlots[i].type === 'Wood') {
                            inventorySlots[i].count += 2;
                            updateUI();
                            playSfx(400, 'square', 0.1, 0.1);
                            return;
                        }
                    }
                    for (let i = 0; i < 16; i++) {
                        if (!inventorySlots[i]) {
                            inventorySlots[i] = { type: 'Wood', count: 2 };
                            updateUI();
                            playSfx(400, 'square', 0.1, 0.1);
                            return;
                        }
                    }
                }
                if (target.itemType === 'Rock') {
                    for (let i = 0; i < 16; i++) {
                        if (inventorySlots[i] && inventorySlots[i].type === 'Rock') {
                            inventorySlots[i].count++;
                            updateUI();
                            playSfx(300, 'square', 0.1, 0.1);
                            return;
                        }
                    }
                    for (let i = 0; i < 16; i++) {
                        if (!inventorySlots[i]) {
                            inventorySlots[i] = { type: 'Rock', count: 1 };
                            updateUI();
                            playSfx(300, 'square', 0.1, 0.1);
                            return;
                        }
                    }
                }
            }

            // Check hitting boars
            for (let i = boars.length - 1; i >= 0; i--) {
                if (hitRay.intersectObject(boars[i].group, true).length > 0) {
                    if (boars[i].takeDamage()) {
                        boars.splice(i, 1);
                        document.getElementById('boar-ui').innerText = "Slain!";
                    }
                    break;
                }
            }
        }

        /* ===== SPAWN SYSTEM ===== */
        function countWorldObjects(type) {
            if (type === 'Tree') return objects.filter(o => o.itemType === 'Wood').length;
            if (type === 'Rock') return objects.filter(o => o.itemType === 'Rock').length;
            if (type === 'Shrub') return objects.filter(o => o.itemType === 'Shrub').length;
            if (type === 'Boar') return boars.length;
            return 0;
        }

        function getValidSpawn() {
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * 1800 - 900;
                const z = Math.random() * 1800 - 900;
                const elev = getElevation(x, z);
                if (elev >= -2) return { x, z, elev };
            }
            return null;
        }

        function spawnTree() {
            const spawn = getValidSpawn();
            if (!spawn) return;
            const { x, z, elev } = spawn;
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(1, 1.5, 10, 8),
                new THREE.MeshPhongMaterial({ color: 0x4d2911 })
            );
            trunk.position.set(x, elev + 5, z);
            trunk.itemType = 'Wood';
            trunk.castShadow = true;
            scene.add(trunk);
            objects.push(trunk);

            const foliage = new THREE.Mesh(
                new THREE.DodecahedronGeometry(5),
                new THREE.MeshPhongMaterial({ color: 0x114d11 })
            );
            foliage.position.set(x, elev + 12, z);
            foliage.castShadow = true;
            foliage.itemType = 'Leaves';
            scene.add(foliage);
            objects.push(foliage);
        }

        function spawnRock() {
            const spawn = getValidSpawn();
            if (!spawn) return;
            const { x, z, elev } = spawn;
            const mesh = new THREE.Mesh(
                new THREE.DodecahedronGeometry(3),
                new THREE.MeshPhongMaterial({ color: 0x888888, flatShading: true })
            );
            const s = Math.random() * 2 + 0.5;
            mesh.scale.set(s, s * 0.7, s);
            mesh.position.set(x, elev + s, z);
            mesh.rotation.set(Math.random(), Math.random(), Math.random());
            mesh.itemType = 'Rock';
            mesh.castShadow = true;
            scene.add(mesh);
            objects.push(mesh);
        }

        function spawnShrub() {
            const spawn = getValidSpawn();
            if (!spawn) return;
            const { x, z, elev } = spawn;
            const mesh = new THREE.Mesh(
                new THREE.DodecahedronGeometry(2),
                new THREE.MeshPhongMaterial({ color: 0x228b22 })
            );
            mesh.position.set(x, elev + 1, z);
            mesh.scale.set(Math.random() + 0.5, Math.random() + 0.5, Math.random() + 0.5);
            mesh.itemType = 'Shrub';
            mesh.castShadow = true;
            scene.add(mesh);
            objects.push(mesh);
        }

        function spawnBoar() {
            boars.push(new Boar());
        }

        function updateSpawns(delta) {
            for (const [type, cfg] of Object.entries(spawnConfig)) {
                cfg.current = countWorldObjects(type);
                if (cfg.current < cfg.maxCount) {
                    cfg.timer += delta;
                    if (cfg.timer >= cfg.respawnTime) {
                        cfg.timer = 0;
                        if (type === 'Tree') spawnTree();
                        else if (type === 'Rock') spawnRock();
                        else if (type === 'Shrub') spawnShrub();
                        else if (type === 'Boar') spawnBoar();
                    }
