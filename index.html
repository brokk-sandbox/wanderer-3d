<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANDERER 3D</title>
    <link rel="stylesheet" href="/src/style.css">

</head>
<body><div id="player-ui"><div id="player-hp-bar"></div></div>
    <div id="target-ui"><div id="target-hp-bar"></div></div>
    <div id="boar-ui">Boar: Neutral</div>

    <div id="toolbar"><div id="toolbar-grid" style="display:flex; gap:10px"></div></div>

    <!-- Backpack Window: 3x4 = 12 slots, with [X] close -->
    <div id="bag-window" class="draggable">
        <div class="win-header"><span>Backpack Storage</span><span class="win-close" data-win="bag">[ X ]</span></div>
        <div id="bag-grid"></div>
    </div>

    <!-- Storage Box Window, with [X] close -->
    <div id="box-window" class="draggable">
        <div class="win-header"><span>Storage Box</span><span class="win-close" data-win="box">[ X ]</span></div>
        <div id="box-grid"></div>
    </div>

    <!-- Character/Equipment Window, with [X] close -->
    <div id="equip-window" class="draggable" style="top: 100px; left: 100px; transform: none;">
        <div class="win-header"><span>Character</span><span class="win-close" data-win="equip">[ X ]</span></div>
        <div class="paperdoll-area">
            <!-- Human silhouette -->
            <div class="pd-head"></div>
            <div class="pd-neck"></div>
            <div class="pd-torso"></div>
            <div class="pd-arm-l"></div>
            <div class="pd-arm-r"></div>
            <div class="pd-hand-l"></div>
            <div class="pd-hand-r"></div>
            <div class="pd-waist"></div>
            <div class="pd-leg-l"></div>
            <div class="pd-leg-r"></div>
            <div class="pd-foot-l"></div>
            <div class="pd-foot-r"></div>
            <!-- Equipment slots over body parts -->
            <div id="slot-head" class="equip-slot" style="top:10px; left:140px;" data-label="HEAD"></div>
            <div id="slot-torso" class="equip-slot" style="top:100px; left:140px;" data-label="TORSO"></div>
            <div id="slot-armor" class="equip-slot" style="top:100px; left:15px;" data-label="ARMOR"></div>
            <div id="slot-back" class="equip-slot" style="top:100px; right:15px;" data-label="BACK"></div>
            <div id="slot-lhand" class="equip-slot" style="top:195px; left:15px;" data-label="L-HAND"></div>
            <div id="slot-rhand" class="equip-slot" style="top:195px; right:15px;" data-label="R-HAND"></div>
            <div id="slot-legs" class="equip-slot" style="top:265px; left:140px;" data-label="LEGS"></div>
            <div id="slot-feet" class="equip-slot" style="top:355px; left:140px;" data-label="FEET"></div>
            <!-- Labels positioned below the doll -->
            <div style="position:absolute; bottom:8px; width:100%; text-align:center; font-size:10px; color:#555;">⌨ I — Toggle Character</div>
        </div>
    </div>

    <!-- Pockets Window: 2x2 = 4 slots, with [X] close -->
    <div id="pockets-window" class="draggable" style="border-color:#6d3b1a; top: auto; bottom: 100px; left: 100px; transform: none;">
        <div class="win-header"><span>Pants Pockets</span><span class="win-close" data-win="pockets">[ X ]</span></div>
        <div style="display: grid; grid-template-columns: repeat(2, 65px); gap: 10px;">
            <div id="pocket-0" class="slot"></div>
            <div id="pocket-1" class="slot"></div>
            <div id="pocket-2" class="slot"></div>
            <div id="pocket-3" class="slot"></div>
        </div>
    </div>

    <!-- Crafting Window, with [X] close -->
    <div id="craft-window" class="draggable">
        <div class="win-header"><span id="craft-title">Crafting</span><span class="win-close" data-win="craft">[ X ]</span></div>
        <div id="recipe-list"></div>
    </div>

    <div id="drag-icon"></div>
    <div id="crosshair"></div>
    <div id="pickup-progress-container" style="display:none; position:absolute; top:52%; left:50%; transform:translate(-50%, -50%); width:60px; height:6px; background:rgba(0,0,0,0.6); border:1px solid #fff; z-index:1000; pointer-events:none; border-radius:3px; overflow:hidden;">
        <div id="pickup-progress-bar" style="width:0%; height:100%; background:#ffd700;"></div>
    </div>
    <div id="place-ui" style="position:absolute; bottom:180px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:#ffd700; padding:8px 16px; border-radius:8px; border:1px solid #ffd700; font-size:12px; font-weight:bold; display:none; z-index:1000; text-align:center; pointer-events:none;">PLACEMENT MODE<br><span style="font-size:10px; color:#aaa;">Left Click = Place  |  Right Click / Esc = Cancel</span></div>

    <!-- Main Menu -->
    <div id="main-menu" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow-y:auto;">
        <h1 style="color:#cd853f; font-size:48px; margin-bottom:40px;">WANDERER 3D</h1>
        <div style="display:flex; flex-direction:column; gap:20px; width:300px;">
            <button id="btn-start" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#8b4513; color:white; border:none;">START ADVENTURE</button>
            <button id="btn-resume" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#cd853f; color:white; border:none; display:none;">RESUME</button>
            <button id="btn-save" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#444; color:white; border:none;">SAVE GAME</button>
            <button id="btn-load" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#444; color:white; border:none;">LOAD GAME</button>
            <button id="btn-quit" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#333; color:#888; border:none;">QUIT TO MENU</button>
            <button id="btn-admin" style="padding:15px; cursor:pointer; font-weight:bold; border-radius:8px; background:#1a1a1a; color:#ff6600; border:1px solid #ff6600;">⚙ ADMIN SETTINGS</button>
        </div>
        <div id="admin-panel">
            <h3>⚙ Spawn Rate Configuration</h3>
            <div id="spawn-controls"></div>
            <h3 style="margin-top:16px;">📦 Give Item</h3>
            <div class="give-section">
                <div class="give-row">
                    <select id="give-item-select"></select>
                    <input type="number" id="give-item-count" min="1" max="999" value="1">
                    <button id="btn-give">GIVE</button>
                </div>
                <div id="give-feedback" style="color:#66ff66; font-size:11px; margin-top:6px; min-height:16px;"></div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
